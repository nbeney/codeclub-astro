<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Playground — Code Club</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #23263a;
    --border:    #2e3250;
    --accent:    #7c6fff;
    --accent-dk: #5a4fe0;
    --green:     #3dd68c;
    --red:       #ff6b6b;
    --yellow:    #ffd166;
    --text:      #e2e4f0;
    --muted:     #8b90b0;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui:   system-ui, -apple-system, sans-serif;
    --radius:    8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ── */
  button {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    padding: 7px 14px;
    transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(0.97); }
  .btn-run {
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 18px;
  }
  .btn-run:hover { background: var(--accent-dk); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-clear {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }
  .btn-example {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 12px;
  }
  .btn-example:hover { color: var(--text); border-color: var(--muted); }

  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr;
    flex: 1;
    overflow: hidden;
    gap: 1px;
    background: var(--border);
  }

  /* ── Editor pane ── */
  .editor-pane {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }
  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pane-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* CodeMirror overrides */
  .CodeMirror {
    height: 100% !important;
    font-family: var(--font-mono) !important;
    font-size: 14px !important;
    line-height: 1.7 !important;
    background: #21222c !important;
  }
  .cm-wrap { flex: 1; overflow: hidden; }

  /* ── Console pane ── */
  .console-pane {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }
  .console-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.8;
    scroll-behavior: smooth;
  }
  .console-output::-webkit-scrollbar { width: 6px; }
  .console-output::-webkit-scrollbar-track { background: transparent; }
  .console-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .out-line { white-space: pre-wrap; word-break: break-word; }
  .out-line.print  { color: var(--text); }
  .out-line.error  { color: var(--red); }
  .out-line.system { color: var(--muted); font-style: italic; }
  .out-line.prompt { color: var(--yellow); }
  .out-line.user-in { color: var(--green); }
  .out-line.success { color: var(--green); }

  /* ── Input row ── */
  .input-row {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    gap: 8px;
    flex-shrink: 0;
  }
  .input-row.hidden { display: none; }
  .input-prompt-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--yellow);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #console-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }
  #console-input:focus { border-color: var(--accent); }
  .btn-send {
    background: var(--accent);
    color: #fff;
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-send:hover { background: var(--accent-dk); }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.ready  { background: var(--green); }
  .status-dot.busy   { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.error  { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
    transition: opacity .4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { color: var(--muted); font-size: 14px; }

  /* ── Examples menu ── */
  .examples-wrap { position: relative; }
  .examples-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    z-index: 50;
    min-width: 200px;
    display: none;
  }
  .examples-menu.open { display: block; }
  .examples-menu button {
    display: block;
    width: 100%;
    text-align: left;
    border-radius: 0;
    padding: 9px 14px;
    color: var(--text);
    background: transparent;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .examples-menu button:last-child { border-bottom: none; }
  .examples-menu button:hover { background: var(--surface); }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p class="loader-text">Loading Python… (first load takes a moment)</p>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🐍</div>
    Python Playground
  </div>
  <div class="header-actions">
    <div class="examples-wrap">
      <button class="btn-example" id="examples-btn">Examples ▾</button>
      <div class="examples-menu" id="examples-menu">
        <button onclick="loadExample('hello')">👋 Hello &amp; input</button>
        <button onclick="loadExample('loop')">🔁 Counting loop</button>
        <button onclick="loadExample('fizzbuzz')">🎯 FizzBuzz</button>
        <button onclick="loadExample('guess')">🎲 Number guessing game</button>
        <button onclick="loadExample('list')">📋 Lists &amp; functions</button>
      </div>
    </div>
    <button class="btn-clear" onclick="clearConsole()">Clear console</button>
    <button class="btn-run" id="run-btn" onclick="runCode()" disabled>
      ▶ Run
    </button>
  </div>
</header>

<!-- Main -->
<main>
  <!-- Editor pane -->
  <div class="editor-pane">
    <div class="pane-header">
      <span class="pane-label">
        <span class="dot" style="background:#7c6fff"></span>
        Editor — main.py
      </span>
    </div>
    <textarea id="editor"># Welcome to Python Playground! 🐍
# Write your code here and press ▶ Run

name = input("What's your name? ")
print("Hello,", name + "!")
print("Let's code something amazing today.")
</textarea>
  </div>

  <!-- Console pane -->
  <div class="console-pane">
    <div class="pane-header">
      <span class="pane-label">
        <span class="dot" style="background:#3dd68c"></span>
        Console
      </span>
    </div>
    <div class="console-output" id="output" aria-live="polite" aria-label="Console output"></div>
    <div class="input-row hidden" id="input-row">
      <span class="input-prompt-label" id="input-prompt-label">▸</span>
      <input type="text" id="console-input" placeholder="Type your answer and press Enter…" autocomplete="off" spellcheck="false">
      <button class="btn-send" onclick="submitInput()">Send</button>
    </div>
  </div>
</main>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Loading Pyodide…</span>
</div>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
let pyodide = null;
let inputResolve = null;
let editor = null;

// ── CodeMirror setup ──
window.addEventListener('DOMContentLoaded', () => {
  editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: 'python',
    theme: 'dracula',
    lineNumbers: true,
    autoCloseBrackets: true,
    matchBrackets: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    extraKeys: {
      'Tab': cm => cm.replaceSelection('    '),
      'Ctrl-Enter': runCode,
      'Cmd-Enter': runCode
    },
    lineWrapping: false,
  });
  editor.setSize('100%', '100%');
});

// ── Load Pyodide ──
async function loadPython() {
  setStatus('busy', 'Loading Python…');
  try {
    pyodide = await loadPyodide();

    // Expose JS helpers globally for Python to call
    window._print_fn = (text) => appendOutput(text, 'print');
    window._err_fn = (text) => appendOutput(text, 'error');
    window._flush_output = () => flushOutput();

    await pyodide.runPythonAsync(`
import sys
import builtins
import js

class _Writer:
    def __init__(self, kind):
        self.kind = kind
    def write(self, text):
        if text:
            if self.kind == 'out':
                js.window._print_fn(text)
            else:
                js.window._err_fn(text)
    def flush(self): pass

sys.stdout = _Writer('out')
sys.stderr = _Writer('err')

# Synchronous input using browser prompt() dialog
def _sync_input(prompt=''):
    sys.stdout.write(prompt)
    sys.stdout.flush()
    js.window._flush_output()
    result = js.window.prompt(prompt)
    if result is None:
        raise EOFError("User cancelled input")
    js.window._print_fn(result + "\\n")
    return result

builtins.input = _sync_input
`);

    setStatus('ready', 'Python ready — Ctrl+Enter to run');
    document.getElementById('run-btn').disabled = false;
    document.getElementById('loading').classList.add('hidden');
    appendOutput('Python 3 ready. Press ▶ Run or Ctrl+Enter to execute your code.\n', 'system');
  } catch(e) {
    setStatus('error', 'Failed to load Python');
    appendOutput('Error loading Python: ' + e.message, 'error');
  }
}

// ── Run code ──
async function runCode() {
  if (!pyodide) return;
  const code = editor.getValue();
  if (!code.trim()) return;

  setStatus('busy', 'Running…');
  document.getElementById('run-btn').disabled = true;
  appendOutput('\n── Running ──────────────────────\n', 'system');

  try {
    await pyodide.runPythonAsync(code);
    flushOutput();
    appendOutput('── Done ──────────────────────────\n', 'system');
    setStatus('ready', 'Done — Ctrl+Enter to run again');
  } catch(err) {
    const msg = err.message || String(err);
    const lines = msg.split('\n');
    const clean = lines.filter(l => !l.includes('pyodide')).join('\n');
    flushOutput();
    appendOutput((clean || msg) + '\n', 'error');
    setStatus('error', 'Error — see console');
  } finally {
    document.getElementById('run-btn').disabled = false;
    hideInputRow();
  }
}

// ── Console output ──
let outputBuffer = '';

function appendOutput(text, cls) {
  if (cls === 'print') {
    // Buffer stdout and only render complete lines
    outputBuffer += text;
    const lines = outputBuffer.split('\n');
    // Keep the last (possibly incomplete) chunk in the buffer
    outputBuffer = lines.pop();
    for (const line of lines) {
      renderLine(line, cls);
    }
  } else {
    // Flush any pending stdout before rendering system/error/etc
    flushOutput();
    renderLine(text, cls);
  }
}

function flushOutput() {
  if (outputBuffer) {
    renderLine(outputBuffer, 'print');
    outputBuffer = '';
  }
}

function renderLine(text, cls) {
  const el = document.getElementById('output');
  const line = document.createElement('div');
  line.className = 'out-line ' + cls;
  line.textContent = text;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearConsole() {
  document.getElementById('output').innerHTML = '';
}

// ── Input handling ──
function showInputRow(prompt) {
  const row = document.getElementById('input-row');
  const label = document.getElementById('input-prompt-label');
  label.textContent = prompt ? '▸' : '▸';
  row.classList.remove('hidden');
  document.getElementById('console-input').value = '';
  document.getElementById('console-input').focus();
}

function hideInputRow() {
  document.getElementById('input-row').classList.add('hidden');
  inputResolve = null;
}

function submitInput() {
  const input = document.getElementById('console-input');
  const val = input.value;
  if (inputResolve) {
    appendOutput(val + '\n', 'user-in');
    inputResolve(val);
    inputResolve = null;
    hideInputRow();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('input-row').offsetParent !== null) {
    if (document.activeElement === document.getElementById('console-input')) {
      submitInput();
    }
  }
});

// ── Status ──
function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = msg;
}

// ── Examples ──
const examples = {
  hello: `# Ask the user for their name and greet them
name = input("What's your name? ")
age = input("How old are you? ")
print("Nice to meet you,", name + "!")
print("You are", age, "years old.")
`,
  loop: `# Count from 1 to 10 and show if each number is odd or even
for i in range(1, 11):
    if i % 2 == 0:
        print(i, "is even")
    else:
        print(i, "is odd")
`,
  fizzbuzz: `# FizzBuzz: a classic coding challenge!
for i in range(1, 21):
    if i % 15 == 0:
        print("FizzBuzz")
    elif i % 3 == 0:
        print("Fizz")
    elif i % 5 == 0:
        print("Buzz")
    else:
        print(i)
`,
  guess: `# Number guessing game
import random

secret = random.randint(1, 10)
print("I'm thinking of a number between 1 and 10.")

attempts = 0
while True:
    guess = int(input("Your guess: "))
    attempts += 1
    if guess < secret:
        print("Too low! Try again.")
    elif guess > secret:
        print("Too high! Try again.")
    else:
        print(f"🎉 Correct! You got it in {attempts} attempts.")
        break
`,
  list: `# Using lists and a function
def get_average(numbers):
    total = sum(numbers)
    return total / len(numbers)

scores = []
print("Enter 5 quiz scores:")

for i in range(1, 6):
    score = float(input(f"Score {i}: "))
    scores.append(score)

avg = get_average(scores)
print(f"\\nYour scores: {scores}")
print(f"Average: {avg:.1f}")

if avg >= 80:
    print("Great work! 🌟")
elif avg >= 60:
    print("Good effort! 👍")
else:
    print("Keep practising! 💪")
`
};

function loadExample(key) {
  editor.setValue(examples[key]);
  clearConsole();
  document.getElementById('examples-menu').classList.remove('open');
  editor.focus();
}

// Examples toggle
document.getElementById('examples-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('examples-menu').classList.toggle('open');
});
document.addEventListener('click', () => {
  document.getElementById('examples-menu').classList.remove('open');
});

// ── Boot ──
loadPython();
</script>
</body>
</html>
