<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Playground — Code Club</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #23263a;
    --border:    #2e3250;
    --accent:    #7c6fff;
    --accent-dk: #5a4fe0;
    --green:     #3dd68c;
    --red:       #ff6b6b;
    --yellow:    #ffd166;
    --text:      #e2e4f0;
    --muted:     #8b90b0;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui:   system-ui, -apple-system, sans-serif;
    --radius:    8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ── */
  button {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    padding: 7px 14px;
    transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(0.97); }
  .btn-run {
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 18px;
  }
  .btn-run:hover { background: var(--accent-dk); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-clear {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-clear:hover { color: var(--text); border-color: var(--muted); }
  .btn-example {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 12px;
  }
  .btn-example:hover { color: var(--text); border-color: var(--muted); }

  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr;
    flex: 1;
    overflow: hidden;
    gap: 1px;
    background: var(--border);
  }

  /* ── Editor pane ── */
  .editor-pane {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }
  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pane-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* CodeMirror overrides */
  .CodeMirror {
    height: 100% !important;
    font-family: var(--font-mono) !important;
    font-size: 14px !important;
    line-height: 1.7 !important;
    background: #21222c !important;
  }
  .cm-wrap { flex: 1; overflow: hidden; }

  /* ── Console pane ── */
  .console-pane {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }
  .console-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.8;
    scroll-behavior: smooth;
  }
  .console-output::-webkit-scrollbar { width: 6px; }
  .console-output::-webkit-scrollbar-track { background: transparent; }
  .console-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── p5 canvas ── */
  #p5-container {
    display: none;
    justify-content: center;
    align-items: center;
    padding: 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    overflow: auto;
    max-height: 50%;
  }
  #p5-container.visible { display: flex; }
  #p5-container canvas {
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .out-line { white-space: pre-wrap; word-break: break-word; }
  .out-line.print  { color: var(--text); }
  .out-line.error  { color: var(--red); }
  .out-line.system { color: var(--muted); font-style: italic; }
  .out-line.prompt { color: var(--yellow); }
  .out-line.user-in { color: var(--green); }
  .out-line.success { color: var(--green); }

  /* ── Input row ── */
  .input-row {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    gap: 8px;
    flex-shrink: 0;
  }
  .input-row.hidden { display: none; }
  .input-prompt-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--yellow);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #console-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }
  #console-input:focus { border-color: var(--accent); }
  .btn-send {
    background: var(--accent);
    color: #fff;
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-send:hover { background: var(--accent-dk); }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.ready  { background: var(--green); }
  .status-dot.busy   { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.error  { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
    transition: opacity .4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { color: var(--muted); font-size: 14px; }

  /* ── Examples menu ── */
  .examples-wrap { position: relative; }
  .examples-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    z-index: 50;
    min-width: 200px;
    display: none;
  }
  .examples-menu.open { display: block; }
  .examples-menu button {
    display: block;
    width: 100%;
    text-align: left;
    border-radius: 0;
    padding: 9px 14px;
    color: var(--text);
    background: transparent;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .examples-menu button:last-child { border-bottom: none; }
  .examples-menu button:hover { background: var(--surface); }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p class="loader-text">Loading Python… (first load takes a moment)</p>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🐍</div>
    Python Playground
  </div>
  <div class="header-actions">
    <div class="examples-wrap">
      <button class="btn-example" id="examples-btn">Examples ▾</button>
      <div class="examples-menu" id="examples-menu">
        <button onclick="loadExample('hello')">👋 Hello &amp; input</button>
        <button onclick="loadExample('loop')">🔁 Counting loop</button>
        <button onclick="loadExample('fizzbuzz')">🎯 FizzBuzz</button>
        <button onclick="loadExample('guess')">🎲 Number guessing game</button>
        <button onclick="loadExample('list')">📋 Lists &amp; functions</button>
        <button onclick="loadExample('p5draw')">🎨 p5 drawing</button>
      </div>
    </div>
    <button class="btn-clear" onclick="clearConsole()">Clear console</button>
    <button class="btn-run" id="run-btn" onclick="runCode()" disabled>
      ▶ Run
    </button>
  </div>
</header>

<!-- Main -->
<main>
  <!-- Editor pane -->
  <div class="editor-pane">
    <div class="pane-header">
      <span class="pane-label">
        <span class="dot" style="background:#7c6fff"></span>
        Editor — main.py
      </span>
    </div>
    <textarea id="editor"># Welcome to Python Playground! 🐍
# Write your code here and press ▶ Run

name = input("What's your name? ")
print("Hello,", name + "!")
print("Let's code something amazing today.")
</textarea>
  </div>

  <!-- Console pane -->
  <div class="console-pane">
    <div class="pane-header">
      <span class="pane-label">
        <span class="dot" style="background:#3dd68c"></span>
        Console
      </span>
    </div>
    <div class="console-output" id="output" aria-live="polite" aria-label="Console output"></div>
    <div id="p5-container" aria-label="Visual output canvas"></div>
    <div class="input-row hidden" id="input-row">
      <span class="input-prompt-label" id="input-prompt-label">▸</span>
      <input type="text" id="console-input" placeholder="Type your answer and press Enter…" autocomplete="off" spellcheck="false">
      <button class="btn-send" onclick="submitInput()">Send</button>
    </div>
  </div>
</main>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Loading Pyodide…</span>
</div>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<!-- p5.js v1.4.1 (same version as Raspberry Pi Foundation Code Editor) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.min.js"></script>
<script>
let pyodide = null;
let inputResolve = null;
let editor = null;

// ── CodeMirror setup ──
window.addEventListener('DOMContentLoaded', () => {
  editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: 'python',
    theme: 'dracula',
    lineNumbers: true,
    autoCloseBrackets: true,
    matchBrackets: true,
    indentUnit: 4,
    tabSize: 4,
    indentWithTabs: false,
    extraKeys: {
      'Tab': cm => cm.replaceSelection('    '),
      'Ctrl-Enter': runCode,
      'Cmd-Enter': runCode
    },
    lineWrapping: false,
  });
  editor.setSize('100%', '100%');
});

// ── Load Pyodide ──
async function loadPython() {
  setStatus('busy', 'Loading Python…');
  try {
    pyodide = await loadPyodide();

    // Expose JS helpers globally for Python to call
    window._print_fn = (text) => appendOutput(text, 'print');
    window._err_fn = (text) => appendOutput(text, 'error');
    window._flush_output = () => flushOutput();

    await pyodide.runPythonAsync(`
import sys
import builtins
import js

class _Writer:
    def __init__(self, kind):
        self.kind = kind
    def write(self, text):
        if text:
            if self.kind == 'out':
                js.window._print_fn(text)
            else:
                js.window._err_fn(text)
    def flush(self): pass

sys.stdout = _Writer('out')
sys.stderr = _Writer('err')

# Synchronous input using browser prompt() dialog
def _sync_input(prompt=''):
    sys.stdout.write(prompt)
    sys.stdout.flush()
    js.window._flush_output()
    result = js.window.prompt(prompt)
    if result is None:
        raise EOFError("User cancelled input")
    js.window._print_fn(result + "\\n")
    return result

builtins.input = _sync_input
`);

    setStatus('ready', 'Python ready — Ctrl+Enter to run');
    document.getElementById('run-btn').disabled = false;
    document.getElementById('loading').classList.add('hidden');
    appendOutput('Python 3 ready. Press ▶ Run or Ctrl+Enter to execute your code.\n', 'system');

    // Set up p5.js bridge module
    setupP5Module();
    await registerP5PythonModule();
  } catch(e) {
    setStatus('error', 'Failed to load Python');
    appendOutput('Error loading Python: ' + e.message, 'error');
  }
}

// ── p5 support ──
let p5Instance = null;

function destroyP5() {
  if (p5Instance) {
    p5Instance.remove();
    p5Instance = null;
  }
  const container = document.getElementById('p5-container');
  container.innerHTML = '';
  container.classList.remove('visible');
}

function setupP5Module() {
  // Reset global p5 callback references
  window._p5_draw_fn = null;
  window._p5_setup_fn = null;
  window._p5_key_pressed_fn = null;
  window._p5_mouse_pressed_fn = null;
  window._p5_mouse_released_fn = null;
  window._p5_mouse_moved_fn = null;
  window._p5_mouse_dragged_fn = null;
  window._p5_run_requested = false;
  window._p5_requested_frame_rate = 60;
  window._p5_setup_called = false;
  window._p5inst = null;
}

async function registerP5PythonModule() {
  await pyodide.runPythonAsync(`
import sys
import types
import js
from pyodide.ffi import create_proxy

_p5mod = types.ModuleType('p5')
_p5mod.__file__ = '<p5 bridge>'

# -- Constants --
import math as _math
_p5mod.PI = _math.pi
_p5mod.HALF_PI = _math.pi / 2
_p5mod.QUARTER_PI = _math.pi / 4
_p5mod.TWO_PI = _math.pi * 2
_p5mod.TAU = _math.pi * 2
_p5mod.DEG_TO_RAD = _math.pi / 180
_p5mod.RAD_TO_DEG = 180 / _math.pi

_p5mod.P2D = 'p2d'
_p5mod.WEBGL = 'webgl'

_p5mod.CORNER = 'corner'
_p5mod.CORNERS = 'corners'
_p5mod.RADIUS = 'radius'
_p5mod.CENTER = 'center'
_p5mod.LEFT = 'left'
_p5mod.RIGHT = 'right'
_p5mod.TOP = 'top'
_p5mod.BOTTOM = 'bottom'
_p5mod.BASELINE = 'alphabetic'

_p5mod.CLOSE = 'close'
_p5mod.OPEN = 'open'
_p5mod.CHORD = 'chord'
_p5mod.PIE = 'pie'
_p5mod.ROUND = 'round'
_p5mod.SQUARE = 'butt'
_p5mod.PROJECT = 'square'
_p5mod.BEVEL = 'bevel'
_p5mod.MITER = 'miter'

_p5mod.RGB = 'rgb'
_p5mod.HSB = 'hsb'
_p5mod.HSL = 'hsl'

_p5mod.DEGREES = 'degrees'
_p5mod.RADIANS = 'radians'

_p5mod.NORMAL = 'normal'
_p5mod.ITALIC = 'italic'
_p5mod.BOLD = 'bold'
_p5mod.BOLDITALIC = 'bold italic'

_p5mod.POINTS = 0x0000
_p5mod.LINES = 0x0001
_p5mod.TRIANGLES = 0x0004
_p5mod.TRIANGLE_FAN = 0x0006
_p5mod.TRIANGLE_STRIP = 0x0005
_p5mod.QUADS = 'quads'
_p5mod.QUAD_STRIP = 'quad_strip'

# Arrow keys
_p5mod.LEFT_ARROW = 37
_p5mod.RIGHT_ARROW = 39
_p5mod.UP_ARROW = 38
_p5mod.DOWN_ARROW = 40
_p5mod.ENTER = 13
_p5mod.SHIFT = 16
_p5mod.BACKSPACE = 8
_p5mod.DELETE = 46
_p5mod.TAB = 9
_p5mod.ESCAPE = 27

# -- Helper to get the p5 instance --
def _inst():
    return js.window._p5inst

# -- Environment --
def _get_width():
    p = _inst()
    return p.width if p else 0

def _get_height():
    p = _inst()
    return p.height if p else 0

def _get_mouse_x():
    p = _inst()
    return p.mouseX if p else 0

def _get_mouse_y():
    p = _inst()
    return p.mouseY if p else 0

def _get_frame_count():
    p = _inst()
    return p.frameCount if p else 0

def _get_key():
    p = _inst()
    return str(p.key) if p else ''

def _get_key_code():
    p = _inst()
    return int(p.keyCode) if p else 0

def _get_mouse_is_pressed():
    p = _inst()
    return bool(p.mouseIsPressed) if p else False

# We use a class with __getattr__ to provide dynamic properties
class _P5Module(types.ModuleType):
    _DYNAMIC = {'width', 'height', 'mouse_x', 'mouse_y',
                'frame_count', 'key', 'key_code', 'mouse_is_pressed'}

    def __getattribute__(self, name):
        if name in object.__getattribute__(self, '_DYNAMIC'):
            if name == 'width':
                return _get_width()
            elif name == 'height':
                return _get_height()
            elif name == 'mouse_x':
                return _get_mouse_x()
            elif name == 'mouse_y':
                return _get_mouse_y()
            elif name == 'frame_count':
                return _get_frame_count()
            elif name == 'key':
                return _get_key()
            elif name == 'key_code':
                return _get_key_code()
            elif name == 'mouse_is_pressed':
                return _get_mouse_is_pressed()
        return super().__getattribute__(name)

# Copy all existing attributes to the class-based module
_p5dyn = _P5Module('p5')
for _k, _v in _p5mod.__dict__.items():
    if not _k.startswith('__'):
        setattr(_p5dyn, _k, _v)
_p5mod = _p5dyn

# Set initial values for dynamic properties so 'from p5 import *' picks them up
_p5mod.mouse_x = 0
_p5mod.mouse_y = 0
_p5mod.width = 0
_p5mod.height = 0
_p5mod.frame_count = 0
_p5mod.key = ''
_p5mod.key_code = 0
_p5mod.mouse_is_pressed = False

# -- Drawing functions --
def size(w, h, mode=None):
    import js
    js.window._p5_canvas_width = w
    js.window._p5_canvas_height = h
    js.window._p5_canvas_mode = mode
    js.window._p5_setup_called = True
_p5mod.size = size

def background(*args):
    _inst().background(*args)
_p5mod.background = background

def fill(*args):
    _inst().fill(*args)
_p5mod.fill = fill

def no_fill():
    _inst().noFill()
_p5mod.no_fill = no_fill

def stroke(*args):
    _inst().stroke(*args)
_p5mod.stroke = stroke

def no_stroke():
    _inst().noStroke()
_p5mod.no_stroke = no_stroke

def stroke_weight(w):
    _inst().strokeWeight(w)
_p5mod.stroke_weight = stroke_weight

def color_mode(*args):
    _inst().colorMode(*args)
_p5mod.color_mode = color_mode

def color(*args):
    return _inst().color(*args)
_p5mod.color = color

# -- Shapes --
def rect(*args):
    _inst().rect(*args)
_p5mod.rect = rect

def ellipse(*args):
    _inst().ellipse(*args)
_p5mod.ellipse = ellipse

def circle(x, y, d):
    _inst().circle(x, y, d)
_p5mod.circle = circle

def line(*args):
    _inst().line(*args)
_p5mod.line = line

def point(*args):
    _inst().point(*args)
_p5mod.point = point

def triangle(x1, y1, x2, y2, x3, y3):
    _inst().triangle(x1, y1, x2, y2, x3, y3)
_p5mod.triangle = triangle

def quad(*args):
    _inst().quad(*args)
_p5mod.quad = quad

def arc(*args):
    _inst().arc(*args)
_p5mod.arc = arc

def square(*args):
    _inst().square(*args)
_p5mod.square = square

# -- Vertex --
def begin_shape(kind=None):
    if kind is None:
        _inst().beginShape()
    else:
        _inst().beginShape(kind)
_p5mod.begin_shape = begin_shape

def end_shape(mode=None):
    if mode is None:
        _inst().endShape()
    else:
        _inst().endShape(mode)
_p5mod.end_shape = end_shape

def vertex(*args):
    _inst().vertex(*args)
_p5mod.vertex = vertex

# -- Transforms --
def translate(*args):
    _inst().translate(*args)
_p5mod.translate = translate

def rotate(angle):
    _inst().rotate(angle)
_p5mod.rotate = rotate

def rotate_x(angle):
    _inst().rotateX(angle)
_p5mod.rotate_x = rotate_x

def rotate_y(angle):
    _inst().rotateY(angle)
_p5mod.rotate_y = rotate_y

def scale(*args):
    _inst().scale(*args)
_p5mod.scale = scale

def push_matrix():
    _inst().push()
_p5mod.push_matrix = push_matrix

def pop_matrix():
    _inst().pop()
_p5mod.pop_matrix = pop_matrix

def push_style():
    _inst().push()
_p5mod.push_style = push_style

def pop_style():
    _inst().pop()
_p5mod.pop_style = pop_style

// Called before running user code that imports p5
function codeUsesP5(code) {
  return /^(?:from\s+p5\s+import|import\s+p5)/m.test(code);
}

async function prepareP5ForRun(code) {
  // Reset p5 state
  destroyP5();
  window._p5_draw_fn = null;
  window._p5_setup_fn = null;
  window._p5_key_pressed_fn = null;
  window._p5_mouse_pressed_fn = null;
  window._p5_mouse_released_fn = null;
  window._p5_mouse_moved_fn = null;
  window._p5_mouse_dragged_fn = null;
  window._p5_setup_called = false;
  window._p5_run_requested = false;
  window._p5_requested_frame_rate = 60;
  window._p5_canvas_width = 400;
  window._p5_canvas_height = 400;
  window._p5_canvas_mode = null;
  window._p5inst = null;
}

// ── Run code ──
async function runCode() {
  if (!pyodide) return;
  const code = editor.getValue();
  if (!code.trim()) return;

  setStatus('busy', 'Running…');
  document.getElementById('run-btn').disabled = true;
  appendOutput('\n── Running ──────────────────────\n', 'system');

  const usesP5 = codeUsesP5(code);

  try {
    // Always clean up a previous p5 sketch
    destroyP5();

    if (usesP5) {
      await prepareP5ForRun(code);
    }

    await pyodide.runPythonAsync(code);

    if (usesP5 && window._p5_run_requested) {
      // Start the p5 sketch now that user code has defined draw(), etc.
      const fr = window._p5_requested_frame_rate || 60;
      const container = document.getElementById('p5-container');
      container.classList.add('visible');

      const sketch = (p) => {
        window._p5inst = p;
        p.setup = function() {
          p.frameRate(fr);
          const w = window._p5_canvas_width || 400;
          const h = window._p5_canvas_height || 400;
          const mode = window._p5_canvas_mode;
          if (mode) {
            p.createCanvas(w, h, mode);
          } else {
            p.createCanvas(w, h);
          }
        };
        p.draw = function() {
          if (window._p5_draw_fn) {
            try { window._p5_draw_fn(); } catch(e) { p.noLoop(); console.error(e); }
          }
        };
        p.keyPressed = function() {
          if (window._p5_key_pressed_fn) {
            try { window._p5_key_pressed_fn(); } catch(e) { console.error(e); }
          }
        };
        p.mousePressed = function() {
          if (window._p5_mouse_pressed_fn) {
            try { window._p5_mouse_pressed_fn(); } catch(e) { console.error(e); }
          }
        };
        p.mouseReleased = function() {
          if (window._p5_mouse_released_fn) {
            try { window._p5_mouse_released_fn(); } catch(e) { console.error(e); }
          }
        };
        p.mouseMoved = function() {
          if (window._p5_mouse_moved_fn) {
            try { window._p5_mouse_moved_fn(); } catch(e) { console.error(e); }
          }
        };
        p.mouseDragged = function() {
          if (window._p5_mouse_dragged_fn) {
            try { window._p5_mouse_dragged_fn(); } catch(e) { console.error(e); }
          }
        };
      };

      p5Instance = new p5(sketch, container);

      // Wire up Python draw/event callbacks after a short delay for p5 init
      await new Promise(r => setTimeout(r, 50));

      // After user code runs, wire up draw/key_pressed/mouse_pressed callbacks
      await pyodide.runPythonAsync(`
import sys as _sys
import js as _js
from pyodide.ffi import create_proxy as _create_proxy

def _wire_p5_callbacks():
    _g = _sys.modules.get('__main__').__dict__
    _p5 = _sys.modules.get('p5')

    # Wrap draw to inject dynamic p5 properties into __main__ globals
    if 'draw' in _g and callable(_g['draw']):
        _original_draw = _g['draw']
        def _draw_wrapper():
            _g['mouse_x'] = _p5.mouse_x
            _g['mouse_y'] = _p5.mouse_y
            _g['width'] = _p5.width
            _g['height'] = _p5.height
            _g['frame_count'] = _p5.frame_count
            _g['key'] = _p5.key
            _g['key_code'] = _p5.key_code
            _g['mouse_is_pressed'] = _p5.mouse_is_pressed
            _original_draw()
        _js.window._p5_draw_fn = _create_proxy(_draw_wrapper)
    if 'key_pressed' in _g and callable(_g['key_pressed']):
        _js.window._p5_key_pressed_fn = _create_proxy(_g['key_pressed'])
    if 'mouse_pressed' in _g and callable(_g['mouse_pressed']):
        _js.window._p5_mouse_pressed_fn = _create_proxy(_g['mouse_pressed'])
    if 'mouse_released' in _g and callable(_g['mouse_released']):
        _js.window._p5_mouse_released_fn = _create_proxy(_g['mouse_released'])
    if 'mouse_moved' in _g and callable(_g['mouse_moved']):
        _js.window._p5_mouse_moved_fn = _create_proxy(_g['mouse_moved'])
    if 'mouse_dragged' in _g and callable(_g['mouse_dragged']):
        _js.window._p5_mouse_dragged_fn = _create_proxy(_g['mouse_dragged'])

_wire_p5_callbacks()
del _wire_p5_callbacks
`);
    }

    flushOutput();
    appendOutput('── Done ──────────────────────────\n', 'system');
    setStatus('ready', 'Done — Ctrl+Enter to run again');
  } catch(err) {
    const msg = err.message || String(err);
    const lines = msg.split('\n');
    const clean = lines.filter(l => !l.includes('pyodide')).join('\n');
    flushOutput();
    appendOutput((clean || msg) + '\n', 'error');
    setStatus('error', 'Error — see console');
  } finally {
    document.getElementById('run-btn').disabled = false;
    hideInputRow();
  }
}

// ── Console output ──
let outputBuffer = '';

function appendOutput(text, cls) {
  if (cls === 'print') {
    // Buffer stdout and only render complete lines
    outputBuffer += text;
    const lines = outputBuffer.split('\n');
    // Keep the last (possibly incomplete) chunk in the buffer
    outputBuffer = lines.pop();
    for (const line of lines) {
      renderLine(line, cls);
    }
  } else {
    // Flush any pending stdout before rendering system/error/etc
    flushOutput();
    renderLine(text, cls);
  }
}

function flushOutput() {
  if (outputBuffer) {
    renderLine(outputBuffer, 'print');
    outputBuffer = '';
  }
}

function renderLine(text, cls) {
  const el = document.getElementById('output');
  const line = document.createElement('div');
  line.className = 'out-line ' + cls;
  line.textContent = text;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearConsole() {
  document.getElementById('output').innerHTML = '';
  destroyP5();
}

// ── Input handling ──
function showInputRow(prompt) {
  const row = document.getElementById('input-row');
  const label = document.getElementById('input-prompt-label');
  label.textContent = prompt ? '▸' : '▸';
  row.classList.remove('hidden');
  document.getElementById('console-input').value = '';
  document.getElementById('console-input').focus();
}

function hideInputRow() {
  document.getElementById('input-row').classList.add('hidden');
  inputResolve = null;
}

function submitInput() {
  const input = document.getElementById('console-input');
  const val = input.value;
  if (inputResolve) {
    appendOutput(val + '\n', 'user-in');
    inputResolve(val);
    inputResolve = null;
    hideInputRow();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('input-row').offsetParent !== null) {
    if (document.activeElement === document.getElementById('console-input')) {
      submitInput();
    }
  }
});

// ── Status ──
function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = msg;
}
